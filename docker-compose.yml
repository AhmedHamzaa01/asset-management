version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/assetdb
      JWT_SECRET_KEY: supersecretkey-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetdb_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/assetdb_test
      JWT_SECRET_KEY: test-secret-key
    depends_on:
      postgres-test:
        condition: service_healthy
    command: ["pytest", "app/tests/", "-v"]

volumes:
  postgres_data: